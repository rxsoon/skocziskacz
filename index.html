<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Skocz i skacz</title>

<style>
body{
  margin:0;
  height:100vh;
  font-family:Arial;
  color:white;
  overflow:hidden;
  display:none;
  background:#0a0a12;
}

/* BACKGROUND CANVAS */
#bg{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  z-index:-2;
  pointer-events:none;
}

body::after{
  content:"";
  position:fixed;
  inset:0;
  background:radial-gradient(circle at center, rgba(0,0,0,0.2), rgba(0,0,0,0.85));
  z-index:-1;
}

/* UI */
h1{
  text-align:center;
  font-size:65px;
  margin-top:20px;
}

#count{
  text-align:center;
  font-size:45px;
}

/* GAME */
.scene{
  position:absolute;
  top:55%;
  left:50%;
  transform:translate(-50%,-50%);
}

.ground{
  width:460px;
  height:14px;
  background:#999;
  border-radius:12px;
  position:relative;
}

.ball{
  width:85px;
  height:85px;
  border-radius:50%;
  background:gray;
  position:absolute;
  bottom:14px;
  left:50%;
  transform:translateX(-50%);
}

/* SHOP */
.shop{
  position:absolute;
  right:20px;
  top:50%;
  transform:translateY(-50%);
  background:rgba(0,0,0,0.55);
  padding:15px;
  border-radius:14px;
}

.shop button{
  display:block;
  margin:8px 0;
  padding:12px;
  width:180px;
  border:none;
  border-radius:10px;
  font-weight:bold;
  cursor:pointer;
}

.active{
  background:linear-gradient(135deg,#ff6600,#ff8800);
  color:white;
}

.locked{
  background:gray;
  opacity:0.4;
}

/* RANK */
#rank{
  position:absolute;
  left:20px;
  top:20px;
  background:rgba(0,0,0,0.45);
  padding:12px;
  border-radius:12px;
  width:210px;
}

/* PROFILE */
#profile{
  position:absolute;
  top:10px;
  right:10px;
  font-size:28px;
  cursor:pointer;
  z-index:999;
}

#menu{
  display:none;
  position:absolute;
  top:35px;
  right:0;
  background:black;
  padding:8px;
  border-radius:10px;
}

#profile:hover #menu{
  display:block;
}

#menu button{
  background:red;
  border:none;
  color:white;
  padding:8px;
  border-radius:8px;
}
</style>
</head>

<body>

<canvas id="bg"></canvas>

<div id="profile">
👤
<div id="menu">
<button onclick="logout()">Wyloguj</button>
</div>
</div>

<h1>Skocz i skacz</h1>
<div id="count">0</div>

<div class="scene">
  <div class="ground">
    <div class="ball" id="ball"></div>
  </div>
</div>

<div class="shop">
  <button id="b2" onclick="buy2()">x2 (100)</button>
  <button id="bAuto" onclick="buyAuto()">Auto (300)</button>
  <button id="b3" onclick="buy3()">x3 (600)</button>
  <button id="bTurbo" onclick="buyTurbo()">Turbo (1000)</button>
  <button onclick="rebirth()">REBIRTH (10000)</button>
</div>

<div id="rank">
  <h3>TOP 10</h3>
  <ul id="list"></ul>
</div>

<script type="module">
import { auth, db } from "./firebase.js";
import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import {
  doc, getDoc, updateDoc,
  collection, query, orderBy, limit,
  onSnapshot
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

/* STATE */
let count=0;
let mult=1;
let auto=false;
let turbo=false;
let rebirths=0;
let step=0;
let jumping=false;
let userRef;

const ball=document.getElementById("ball");
const countEl=document.getElementById("count");

/* AUTH */
onAuthStateChanged(auth, async (user)=>{
  if(!user){
    location.href="login.html";
    return;
  }

  document.body.style.display="block";

  userRef=doc(db,"users",user.uid);

  const snap=await getDoc(userRef);

  if(snap.exists()){
    const d=snap.data();
    count=d.count||0;
    mult=d.mult||1;
    auto=d.auto||false;
    turbo=d.turbo||false;
    rebirths=d.rebirths||0;
    step=d.step||0;
  }

  updateUI();
  updateBall();
  updateShop();
  loadRank();

  if(auto) startAuto();
  if(turbo) startTurbo();
});

/* LOGOUT */
window.logout = async () => {
  await signOut(auth);
  location.href="login.html";
};

/* JUMP */
function jump(){
  if(jumping) return;
  jumping=true;

  count += mult + rebirths;
  updateUI();
  save();

  let y=14;
  let up=true;

  const anim=setInterval(()=>{
    if(up){
      y+=8;
      if(y>=140) up=false;
    }else{
      y-=8;
      if(y<=14){
        y=14;
        clearInterval(anim);
        jumping=false;
      }
    }

    ball.style.bottom=y+"px";
  },16);
}

document.body.onclick=jump;

/* UI */
function updateUI(){
  countEl.textContent=count;
}

function updateBall(){
  ball.style.background =
    rebirths===0?"gray":
    rebirths===1?"#4da3ff":
    rebirths===2?"#00ff88":
    rebirths===3?"#ffcc00":"gold";
}

/* SAVE FIX */
async function save(){
  if(!userRef) return;
  await updateDoc(userRef,{count,mult,auto,turbo,rebirths,step});
}
window.save = save;

/* RANK FIX */
function loadRank(){
  const q=query(collection(db,"users"),orderBy("count","desc"),limit(10));

  onSnapshot(q,(snap)=>{
    const list=document.getElementById("list");
    list.innerHTML="";

    let i=1;
    snap.forEach(d=>{
      const li=document.createElement("li");
      li.textContent=`${i}. ${d.data().name||"Gracz"} - ${d.data().count||0}`;
      list.appendChild(li);
      i++;
    });
  });
}
window.loadRank = loadRank;

/* SHOP */
function updateShop(){
  const buttons=[
    {id:"b2",step:0},
    {id:"bAuto",step:1},
    {id:"b3",step:2},
    {id:"bTurbo",step:3}
  ];

  buttons.forEach(b=>{
    const el=document.getElementById(b.id);
    el.className = (step===b.step) ? "active" : "locked";
  });
}

/* AUTO */
function startAuto(){
  setInterval(()=>{ if(!jumping) jump(); },1500);
}
function startTurbo(){
  setInterval(()=>{ if(!jumping) jump(); },700);
}

/* SHOP ACTIONS */
window.buy2=()=>{ if(step!==0||count<100)return; count-=100; mult=2; step=1; updateShop(); save(); };
window.buyAuto=()=>{ if(step!==1||count<300)return; count-=300; auto=true; step=2; startAuto(); updateShop(); save(); };
window.buy3=()=>{ if(step!==2||count<600)return; count-=600; mult=3; step=3; updateShop(); save(); };
window.buyTurbo=()=>{ if(step!==3||count<1000)return; count-=1000; turbo=true; step=4; startTurbo(); updateShop(); save(); };
window.rebirth=()=>{ if(step!==4||count<10000)return;
rebirths++; count=0; mult=1; auto=false; turbo=false; step=0;
updateBall(); updateShop(); save(); location.reload();
};
</script>

<!-- 🌌 BACKGROUND -->
<script>
const canvas=document.getElementById("bg");
const ctx=canvas.getContext("2d");

canvas.width=innerWidth;
canvas.height=innerHeight;

const stars=[];

for(let i=0;i<120;i++){
  stars.push({
    x:Math.random()*canvas.width,
    y:Math.random()*canvas.height,
    r:Math.random()*2,
    speed:Math.random()*0.5+0.1
  });
}

function animate(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  for(let s of stars){
    s.y+=s.speed;

    if(s.y>canvas.height){
      s.y=0;
      s.x=Math.random()*canvas.width;
    }

    ctx.beginPath();
    ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
    ctx.fillStyle="white";
    ctx.fill();
  }

  requestAnimationFrame(animate);
}

animate();

window.addEventListener("resize",()=>{
  canvas.width=innerWidth;
  canvas.height=innerHeight;
});
</script>

</body>
</html>
