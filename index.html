<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Skocz i skacz</title>

<style>
body{
  margin:0;
  height:100vh;
  background:radial-gradient(circle,#1e1e2f,#0a0a12);
  font-family:Arial;
  color:white;
  overflow:hidden;
  display:none;
}

h1{
  text-align:center;
  font-size:65px;
  margin-top:20px;
}

#count{
  text-align:center;
  font-size:45px;
}

.scene{
  position:absolute;
  top:55%;
  left:50%;
  transform:translate(-50%,-50%);
}

.ground{
  width:460px;
  height:14px;
  background:#999;
  border-radius:12px;
  position:relative;
}

.ball{
  width:85px;
  height:85px;
  border-radius:50%;
  position:absolute;
  bottom:14px;
  left:50%;
  transform:translateX(-50%);
}

.shop{
  position:absolute;
  right:20px;
  top:50%;
  transform:translateY(-50%);
  background:rgba(0,0,0,0.55);
  padding:15px;
  border-radius:14px;
}

.shop button{
  display:block;
  margin:8px 0;
  padding:12px;
  width:180px;
  border:none;
  border-radius:10px;
  font-weight:bold;
  background:#ff8c00;
  color:black;
}

#rank{
  position:absolute;
  left:20px;
  top:20px;
  background:rgba(0,0,0,0.45);
  padding:12px;
  border-radius:12px;
  width:210px;
}

#profile{
  position:absolute;
  top:10px;
  right:10px;
  font-size:28px;
  cursor:pointer;
}
</style>
</head>

<body>

<div id="profile">👤</div>

<h1>Skocz i skacz</h1>
<div id="count">0</div>

<div class="scene">
  <div class="ground">
    <div class="ball" id="ball"></div>
  </div>
</div>

<div class="shop">
  <button onclick="buy2()">x2 (100)</button>
  <button onclick="buyAuto()">Auto (300)</button>
  <button onclick="buy3()">x3 (600)</button>
  <button onclick="buyTurbo()">Turbo (1000)</button>
  <button onclick="rebirth()">REBIRTH (10000)</button>
</div>

<div id="rank">
  <h3>TOP 10</h3>
  <ul id="list"></ul>
</div>

<script type="module">
import { auth, db } from "./firebase.js";
import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import {
  doc, getDoc, setDoc, updateDoc,
  collection, query, orderBy, limit,
  onSnapshot
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

/* STATE */
let count=0,mult=1,auto=false,turbo=false,rebirths=0,step=0;
let jumping=false;
let userRef;

const ball=document.getElementById("ball");
const countEl=document.getElementById("count");

/* LOGIN */
onAuthStateChanged(auth, async (user)=>{
  if(!user){ location.href="login.html"; return; }

  document.body.style.display="block";
  userRef=doc(db,"users",user.uid);

  const snap=await getDoc(userRef);

  if(snap.exists()){
    const d=snap.data();
    count=d.count||0;
    mult=d.mult||1;
    auto=d.auto||false;
    turbo=d.turbo||false;
    rebirths=d.rebirths||0;
    step=d.step||0;
  }

  updateUI();
  updateBall();
  loadRank();

  getIP_SAFE(); // 🔥 FIX
});

/* 🔥 IP SAFE (NIE RESETUJE GRY + DODAJE BRAKUJĄCE POLA) */
async function getIP_SAFE(){
  try{
    const res = await fetch("https://api.ipify.org?format=json");
    const data = await res.json();

    if(!userRef) return;

    const snap = await getDoc(userRef);

    if(!snap.exists()){
      await setDoc(userRef,{
        ip: data.ip,
        count:0,
        mult:1,
        auto:false,
        turbo:false,
        rebirths:0,
        step:0
      });
    } else {
      await updateDoc(userRef,{
        ip: data.ip
      });
    }

  }catch(e){
    console.log("IP error ignored");
  }
}

/* JUMP */
function jump(){
  if(jumping) return;
  jumping=true;

  const gain = mult + rebirths;
  count += gain;

  updateUI();
  save();

  let y=14,up=true;

  const anim=setInterval(()=>{
    if(up){ y+=8; if(y>=140) up=false; }
    else { y-=8; if(y<=14){ y=14; clearInterval(anim); jumping=false; } }
    ball.style.bottom=y+"px";
  },16);
}

document.body.onclick=jump;

/* UI */
function updateUI(){
  countEl.textContent=count;
}

/* BALL */
function updateBall(){
  const colors=[
    ["#ffffff","#9aa0a6"],
    ["#4da3ff","#1e60ff"],
    ["#00ff88","#00a86b"],
    ["#ffcc00","#ff8800"],
    ["#b84dff","#6a00ff"],
    ["#ff4d4d","#b30000"]
  ];

  let c = colors[rebirths % colors.length];

  ball.style.background =
    "radial-gradient(circle, " + c[0] + ", " + c[1] + ")";

  ball.style.boxShadow="0 0 12px "+c[0];
}

/* SAFE SAVE */
async function save(){
  if(!userRef) return;

  await updateDoc(userRef,{
    count,
    mult,
    auto,
    turbo,
    rebirths,
    step
  });
}

/* SHOP */
window.buy2=()=>{ if(count<100)return; count-=100; mult=2; step=1; save(); };
window.buyAuto=()=>{ if(count<300)return; count-=300; auto=true; step=2; save(); startAuto(); };
window.buy3=()=>{ if(count<600)return; count-=600; mult=3; step=3; save(); };
window.buyTurbo=()=>{ if(count<1000)return; count-=1000; turbo=true; step=4; save(); startTurbo(); };

window.rebirth=()=>{
if(count<10000)return;
rebirths++;
count=0;
mult=1;
auto=false;
turbo=false;
step=0;
updateBall();
save();
};

/* AUTO */
function startAuto(){
  setInterval(()=>{ if(!jumping) jump(); },1500);
}

function startTurbo(){
  setInterval(()=>{ if(!jumping) jump(); },700);
}

/* RANK */
function loadRank(){
  const q=query(collection(db,"users"),orderBy("count","desc"),limit(10));

  onSnapshot(q,(snap)=>{
    const list=document.getElementById("list");
    list.innerHTML="";

    let i=1;
    snap.forEach(d=>{
      const li=document.createElement("li");
      li.textContent=`${i}. ${d.data().name||"Gracz"} - ${d.data().count||0}`;
      list.appendChild(li);
      i++;
    });
  });
}

/* PROFILE */
document.getElementById("profile").onclick=async()=>{
  await signOut(auth);
  location.href="login.html";
};
</script>

</body>
</html>
