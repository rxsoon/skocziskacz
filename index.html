<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Skocz i skacz</title>

<style>
body{
  margin:0;
  height:100vh;
  background:radial-gradient(circle,#1e1e2f,#0a0a12);
  font-family:Arial;
  color:white;
  overflow:hidden;
  display:none;
}

h1{
  text-align:center;
  font-size:65px;
  margin-top:20px;
}

#count{
  text-align:center;
  font-size:45px;
}

.scene{
  position:absolute;
  top:55%;
  left:50%;
  transform:translate(-50%,-50%);
}

.ground{
  width:460px;
  height:14px;
  background:#999;
  border-radius:12px;
  position:relative;
}

.ball{
  width:85px;
  height:85px;
  border-radius:50%;
  position:absolute;
  bottom:14px;
  left:50%;
  transform:translateX(-50%);
}

.shop{
  position:absolute;
  right:20px;
  top:50%;
  transform:translateY(-50%);
  background:rgba(0,0,0,0.55);
  padding:15px;
  border-radius:14px;
}

.shop button{
  display:block;
  margin:8px 0;
  padding:12px;
  width:180px;
  border:none;
  border-radius:10px;
  font-weight:bold;
  background:#ff8c00;
  color:black;
}

#rank{
  position:absolute;
  left:20px;
  top:20px;
  background:rgba(0,0,0,0.45);
  padding:12px;
  border-radius:12px;
  width:210px;
}

#rank li{ margin:6px 0; }

#profile{
  position:absolute;
  top:10px;
  right:10px;
  font-size:28px;
  cursor:pointer;
  z-index:999;
}

#menu{
  display:none;
  position:absolute;
  top:35px;
  right:0;
  background:black;
  padding:8px;
  border-radius:10px;
}

#menu.show{ display:block; }

#menu button{
  background:red;
  border:none;
  color:white;
  padding:8px;
  border-radius:8px;
  cursor:pointer;
}

.float-number{
  position:absolute;
  font-size:22px;
  font-weight:bold;
  color:#00ff88;
  animation:floatUp 0.8s forwards;
  pointer-events:none;
  z-index:9999;
}

@keyframes floatUp{
  0%{opacity:1;}
  100%{opacity:0; transform:translateY(-80px);}
}

.particle{
  position:absolute;
  width:6px;
  height:6px;
  background:white;
  border-radius:50%;
  animation:fly 0.5s forwards;
  pointer-events:none;
  z-index:9999;
}

@keyframes fly{
  0%{opacity:1;}
  100%{opacity:0; transform:translate(var(--x),var(--y));}
}
</style>
</head>

<body>

<div id="profile">👤
  <div id="menu">
    <button onclick="logout()">Wyloguj</button>
  </div>
</div>

<h1>Skocz i skacz</h1>
<div id="count">0</div>

<div class="scene">
  <div class="ground">
    <div class="ball" id="ball"></div>
  </div>
</div>

<div class="shop">
  <button id="b2" onclick="buy2()">x2 (100)</button>
  <button id="bAuto" onclick="buyAuto()">Auto (300)</button>
  <button id="b3" onclick="buy3()">x3 (600)</button>
  <button id="bTurbo" onclick="buyTurbo()">Turbo (1000)</button>
  <button onclick="rebirth()">REBIRTH (10000)</button>
</div>

<div id="rank">
  <h3>TOP 10</h3>
  <ul id="list"></ul>
</div>

<script type="module">
import { auth, db } from "./firebase.js";
import {
  onAuthStateChanged,
  signOut
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

import {
  doc, getDoc, updateDoc, setDoc,
  collection, query, orderBy, limit,
  onSnapshot
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

let count=0,mult=1,auto=false,turbo=false,rebirths=0,step=0;
let jumping=false;
let userRef;

const ball=document.getElementById("ball");
const countEl=document.getElementById("count");

/* LOGIN */
onAuthStateChanged(auth, async (user)=>{
  if(!user){ location.href="login.html"; return; }

  document.body.style.display="block";
  userRef=doc(db,"users",user.uid);

  const snap=await getDoc(userRef);

  if(snap.exists()){
    const d=snap.data();
    count=d.count||0;
    mult=d.mult||1;
    auto=d.auto||false;
    turbo=d.turbo||false;
    rebirths=d.rebirths||0;
    step=d.step||0;
  }

  updateUI();
  updateBall();
  updateShop();
  loadRank();

  saveIP(); // 🔥 ONLY ADDITION
});

/* 🔥 IP PATCH (SAFE, NO RESET GAME) */
async function saveIP(){
  try{
    const res = await fetch("https://api.ipify.org?format=json");
    const data = await res.json();

    if(!userRef) return;

    const snap = await getDoc(userRef);

    if(!snap.exists()){
      await setDoc(userRef,{
        ip: data.ip,
        count:0,
        mult:1,
        auto:false,
        turbo:false,
        rebirths:0,
        step:0
      });
    } else {
      await updateDoc(userRef,{
        ip: data.ip
      });
    }

  }catch(e){
    console.log("IP error ignored");
  }
}

/* GAME (UNCHANGED) */
function jump(){
  if(jumping) return;
  jumping=true;

  const gain = mult + rebirths;
  count += gain;

  updateUI();
  save();

  spawnFloat(gain);
  spawnParticles();

  let y=14,up=true;

  const anim=setInterval(()=>{
    if(up){ y+=8; if(y>=140) up=false; }
    else { y-=8; if(y<=14){ y=14; clearInterval(anim); jumping=false; } }
    ball.style.bottom=y+"px";
  },16);
}

document.body.onclick=jump;

/* FLOAT + PARTICLES (UNCHANGED) */
function spawnFloat(v){
  const el=document.createElement("div");
  el.className="float-number";
  el.textContent="+"+v;

  const r=ball.getBoundingClientRect();
  el.style.left=(r.left + r.width/2) + "px";
  el.style.top=(r.top + window.scrollY) + "px";

  document.body.appendChild(el);
  setTimeout(()=>el.remove(),800);
}

function spawnParticles(){
  const r=ball.getBoundingClientRect();

  for(let i=0;i<10;i++){
    const p=document.createElement("div");
    p.className="particle";

    const x=(Math.random()-0.5)*200;
    const y=(Math.random()-0.5)*200;

    p.style.left=(r.left + r.width/2) + "px";
    p.style.top=(r.top + r.height/2 + window.scrollY) + "px";

    p.style.setProperty("--x",x+"px");
    p.style.setProperty("--y",y+"px");

    document.body.appendChild(p);
    setTimeout(()=>p.remove(),500);
  }
}

/* UI (UNCHANGED) */
function updateUI(){
  countEl.textContent=count;
}

/* BALL COLORS (UNCHANGED) */
function updateBall(){
  const colors=[
    ["#ffffff","#9aa0a6"],
    ["#4da3ff","#1e60ff"],
    ["#00ff88","#00a86b"],
    ["#ffcc00","#ff8800"],
    ["#b84dff","#6a00ff"],
    ["#ff4d4d","#b30000"]
  ];

  let r = rebirths % colors.length;
  let c = colors[r];

  ball.style.background =
    "radial-gradient(circle at 35% 35%, #ffffff66, "+c[0]+" 40%, "+c[1]+" 100%)";

  ball.style.boxShadow="0 0 12px "+c[0];
}

/* SAVE (UNCHANGED) */
async function save(){
  if(!userRef) return;
  await updateDoc(userRef,{count,mult,auto,turbo,rebirths,step});
}

/* SHOP (UNCHANGED) */
function updateShop(){
  const buttons=[
    {id:"b2",step:0},
    {id:"bAuto",step:1},
    {id:"b3",step:2},
    {id:"bTurbo",step:3}
  ];

  buttons.forEach(b=>{
    const el=document.getElementById(b.id);
    if(!el) return;
    el.style.opacity = (step===b.step) ? "1" : "0.4";
  });
}

/* AUTO/TURBO (UNCHANGED) */
function startAuto(){ setInterval(()=>{ if(!jumping) jump(); },1500); }
function startTurbo(){ setInterval(()=>{ if(!jumping) jump(); },700); }

/* SHOP ACTIONS (UNCHANGED) */
window.buy2=()=>{ if(step!==0||count<100)return; count-=100; mult=2; step=1; updateShop(); save(); };
window.buyAuto=()=>{ if(step!==1||count<300)return; count-=300; auto=true; step=2; startAuto(); updateShop(); save(); };
window.buy3=()=>{ if(step!==2||count<600)return; count-=600; mult=3; step=3; updateShop(); save(); };
window.buyTurbo=()=>{ if(step!==3||count<1000)return; count-=1000; turbo=true; step=4; startTurbo(); updateShop(); save(); };

window.rebirth=()=>{
if(step!==4||count<10000)return;
rebirths++; count=0; mult=1; auto=false; turbo=false; step=0;
updateBall(); updateShop(); save();
location.reload();
};

/* RANK (UNCHANGED COLORS FIXED) */
function loadRank(){
  const q=query(collection(db,"users"),orderBy("count","desc"),limit(10));

  onSnapshot(q,(snap)=>{
    const list=document.getElementById("list");
    list.innerHTML="";

    let i=1;
    snap.forEach(d=>{
      const li=document.createElement("li");

      if(i===1) li.style.color="gold";
      else if(i===2) li.style.color="silver";
      else if(i===3) li.style.color="#cd7f32";

      li.textContent=`${i}. ${d.data().name||"Gracz"} - ${d.data().count||0}`;
      list.appendChild(li);
      i++;
    });
  });
}

/* PROFILE */
document.getElementById("profile").onclick=async()=>{
  await signOut(auth);
  location.href="login.html";
};
</script>

</body>
</html>
